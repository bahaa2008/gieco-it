<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة المستخدمين</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="form-page-body">
    <main class="form-page">
      <a class="back-link" href="index.html">← العودة إلى الفهرس</a>
      <h1 class="form-code">إدارة المستخدمين</h1>
      <p class="form-name">إدارة قائمة المستخدمين المستخدمة في نموذج F-IT-01-01.</p>

      <section class="inline-tools">
        <div class="toolbar-row">
          <h2>المستخدمون</h2>
          <button id="openUserModalButton" class="primary-btn" type="button">+ إضافة مستخدم</button>
        </div>
        <input id="userSearchInput" type="search" placeholder="بحث باسم المستخدم..." />
      </section>

      <div class="table-wrap">
        <table aria-label="قائمة المستخدمين">
          <thead>
            <tr>
              <th>#</th>
              <th>اسم المستخدم</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </main>

    <div id="userModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="userModalTitle">
      <div class="modal-card" style="max-width: 560px">
        <div class="modal-header">
          <h3 id="userModalTitle">إضافة / تعديل مستخدم</h3>
          <button id="closeUserModalButton" type="button" class="icon-close" aria-label="إغلاق">×</button>
        </div>
        <form id="userForm" class="inline-form">
          <input id="userName" name="userName" type="text" placeholder="اسم المستخدم" required />
          <button id="saveUserButton" type="submit">حفظ</button>
        </form>
      </div>
    </div>

    <script src="users-management.js"></script>
  </body>
</html>
