<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body class="form-page-body bg-light">
  <main class="form-page container py-4">
    <a class="back-link d-inline-block mb-3" href="../../index.html">← العودة إلى الفهرس</a>
    <h1 class="form-code">F-IT-01-02</h1>
    <p class="form-name text-secondary">الخطة السنوية للصيانة</p>

    <section class="inline-tools card border-0 shadow-sm p-3 mb-3" aria-label="إضافة وتصفية خطة الصيانة">
      <div class="toolbar-row">
        <h2 class="h5 mb-0">إدارة الخطة</h2>
      </div>
      <form id="maintenancePlanForm" class="inline-form mt-3">
        <input id="deviceName" name="deviceName" class="form-control" type="text" placeholder="اسم الجهاز" required />
        <input id="deviceCode" name="deviceCode" class="form-control" type="text" placeholder="كود الجهاز" required />
        <select id="maintenancePlan" name="maintenancePlan" class="form-select" required>
          <option value="">خطة الصيانة</option>
          <option value="شهري">شهري</option>
          <option value="كل شهرين">كل شهرين</option>
          <option value="ربع سنوي">ربع سنوي</option>
          <option value="نصف سنوي">نصف سنوي</option>
          <option value="سنوي">سنوي</option>
        </select>
        <input id="maintenanceDates" name="maintenanceDates" class="form-control" type="text" placeholder="التواريخ (مثال: 2026-01-01, 2026-04-01)" required />
        <button type="submit" class="btn btn-primary">إضافة</button>
      </form>
    </section>

    <div class="table-wrap card border-0 shadow-sm p-2">
      <table class="table table-striped table-hover mb-0" aria-label="الخطة السنوية للصيانة">
        <thead>
          <tr>
            <th>اسم الجهاز</th>
            <th>كود الجهاز</th>
            <th>خطة الصيانة</th>
            <th>التواريخ</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="maintenancePlanTableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="../../f-it-01-02.js"></script>
  <script src="../../settings.js"></script>
  <script>window.ITSystemSettings.applyPageTitle("F-IT-01-02");</script>
</body>
</html>
