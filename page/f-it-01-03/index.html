<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../static/css/styles.css" />
</head>
<body class="form-page-body bg-light">
  <main class="form-page container py-4">
    <a class="back-link d-inline-block mb-3" href="../../index.html">← العودة إلى الفهرس</a>
    <h1 class="form-code">F-IT-01-03</h1>
    <p class="form-name text-secondary">أمر شغل الصيانة</p>

    <section class="inline-tools card border-0 shadow-sm p-3 mb-3" aria-label="إعدادات عرض أوامر الشغل">
      <div class="toolbar-row">
        <h2 class="h5 mb-0">إدارة السجلات</h2>
        <div class="toolbar-actions">
          <button id="openFiltersModalButton" class="btn btn-outline-secondary" type="button">الفلاتر والفرز</button>
        </div>
      </div>
    </section>

    <div class="table-wrap card border-0 shadow-sm p-2">
      <table class="table table-striped table-hover mb-0" aria-label="أمر شغل الصيانة">
        <thead>
          <tr>
            <th>#</th>
            <th>اسم الجهاز</th>
            <th>كود الجهاز</th>
            <th>المخطط الزمني للصيانة الدورية</th>
            <th>تاريخ أمر الشغل</th>
          </tr>
        </thead>
        <tbody id="workOrderTableBody"></tbody>
      </table>
    </div>

    <div class="pagination-bar mt-3" aria-label="ترقيم الصفحات">
      <div id="paginationInfo" class="pagination-info">النتائج: 0</div>
      <div class="pagination-controls">
        <label for="pageSizeSelect">عدد العناصر:</label>
        <select id="pageSizeSelect" class="form-select form-select-sm">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
        <button id="prevPageButton" class="btn btn-outline-secondary btn-sm" type="button">السابق</button>
        <span id="pageIndicator">صفحة 0 من 0</span>
        <button id="nextPageButton" class="btn btn-outline-secondary btn-sm" type="button">التالي</button>
      </div>
    </div>
  </main>

  <div id="filtersModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="filtersModalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="filtersModalTitle">الفلاتر والفرز</h3>
        <button id="closeFiltersModalButton" type="button" class="icon-close" aria-label="إغلاق">×</button>
      </div>
      <div class="filters-panel" aria-label="فلاتر البحث والفرز">
        <input id="searchInput" type="search" placeholder="ابحث مثل Google: اكتب أكثر من كلمة..." />
        <select id="planFilter">
          <option value="">كل مخططات الصيانة</option>
          <option value="شهري">شهري</option>
          <option value="كل شهرين">كل شهرين</option>
          <option value="ربع سنوي">ربع سنوي</option>
          <option value="نصف سنوي">نصف سنوي</option>
          <option value="سنوي">سنوي</option>
        </select>
        <select id="sortField">
          <option value="deviceName">ترتيب حسب اسم الجهاز</option>
          <option value="deviceCode">ترتيب حسب كود الجهاز</option>
          <option value="maintenancePlan">ترتيب حسب خطة الصيانة</option>
          <option value="date">ترتيب حسب تاريخ أمر الشغل</option>
        </select>
        <select id="sortDirection">
          <option value="asc">A-Z</option>
          <option value="desc">Z-A</option>
        </select>
        <button id="clearFiltersButton" type="button">مسح الفلاتر</button>
      </div>
    </div>
  </div>

  <script src="../../static/js/forms/f-it-01-03.js"></script>
  <script src="../../static/js/core/settings.js"></script>
  <script>window.ITSystemSettings.applyPageTitle("F-IT-01-03");</script>
</body>
</html>
