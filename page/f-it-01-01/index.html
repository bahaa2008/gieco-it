<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body class="form-page-body bg-light">
  <main class="form-page container py-4">
    <a class="back-link d-inline-block mb-3" href="../../index.html">← العودة إلى الفهرس</a>
    <h1 class="form-code">F-IT-01-01</h1>
    <p class="form-name text-secondary">بيان بأجهزة الــ ( LAP - PC - الأجهزة المساعدة )</p>

    <section class="inline-tools card border-0 shadow-sm p-3 mb-3" aria-label="إضافة وتصفية سجلات الأجهزة">
      <div class="toolbar-row">
        <h2 class="h5 mb-0">إدارة السجلات</h2>
        <div class="toolbar-actions">
          <button id="openFiltersModalButton" class="btn btn-outline-secondary" type="button">الفلاتر والفرز</button>
          <button id="openFormModalButton" class="btn btn-primary" type="button">+ إضافة سجل جديد</button>
        </div>
      </div>
    </section>

    <div class="table-wrap card border-0 shadow-sm p-2">
      <table class="table table-striped table-hover mb-0" aria-label="نموذج بيانات الجهاز">
        <thead>
          <tr>
            <th>اسم الجهاز</th><th>كود الجهاز</th><th>موديل الجهاز</th><th>بلد المنشأ</th><th>S.N</th><th>فولت أمبير</th><th>أمبير الجهاز</th><th>اسم مستخدم الجهاز</th><th>المخطط الزمني للصيانة الدورية</th><th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="devicesTableBody"></tbody>
      </table>
    </div>
    <div class="pagination-bar mt-3" aria-label="ترقيم الصفحات">
      <div id="paginationInfo" class="pagination-info">النتائج: 0</div>
      <div class="pagination-controls">
        <label for="pageSizeSelect">عدد العناصر:</label>
        <select id="pageSizeSelect" class="form-select form-select-sm">
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="150">150</option>
        </select>
        <button id="prevPageButton" class="btn btn-outline-secondary btn-sm" type="button">السابق</button>
        <span id="pageIndicator">صفحة 1</span>
        <button id="nextPageButton" class="btn btn-outline-secondary btn-sm" type="button">التالي</button>
      </div>
    </div>
  </main>

  <div id="formModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="formModalTitle">
    <div class="modal-card">
      <div class="modal-header"><h3 id="formModalTitle">إضافة / تعديل سجل جهاز</h3><button id="closeFormModalButton" type="button" class="icon-close" aria-label="إغلاق">×</button></div>
      <form id="deviceForm" class="inline-form">
        <input id="deviceName" name="deviceName" type="text" placeholder="اسم الجهاز" required />
        <input id="deviceCode" name="deviceCode" type="text" placeholder="كود الجهاز" required />
        <input id="deviceModel" name="deviceModel" type="text" placeholder="موديل الجهاز" required />
        <input id="originCountry" name="originCountry" type="text" placeholder="بلد المنشأ" />
        <input id="serialNumber" name="serialNumber" type="text" placeholder="S.N" />
        <input id="voltAmpere" name="voltAmpere" type="text" placeholder="فولت أمبير" />
        <input id="deviceAmpere" name="deviceAmpere" type="text" placeholder="أمبير الجهاز" />
        <input id="deviceUser" name="deviceUser" type="text" placeholder="اسم مستخدم الجهاز" />
        <select id="maintenancePlan" name="maintenancePlan"><option value="">المخطط الزمني للصيانة الدورية</option><option value="شهري">شهري</option><option value="كل شهرين">كل شهرين</option><option value="ربع سنوي">ربع سنوي</option><option value="نصف سنوي">نصف سنوي</option><option value="سنوي">سنوي</option></select>
        <button type="submit">إضافة</button>
      </form>
    </div>
  </div>

  <div id="filtersModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="filtersModalTitle">
    <div class="modal-card">
      <div class="modal-header"><h3 id="filtersModalTitle">الفلاتر والفرز + استيراد CSV</h3><button id="closeFiltersModalButton" type="button" class="icon-close" aria-label="إغلاق">×</button></div>
      <div class="filters-panel" aria-label="فلاتر البحث والفرز">
        <input id="searchInput" type="search" placeholder="ابحث مثل Google: اكتب أكثر من كلمة..." />
        <select id="planFilter"><option value="">كل مخططات الصيانة</option><option value="شهري">شهري</option><option value="كل شهرين">كل شهرين</option><option value="ربع سنوي">ربع سنوي</option><option value="نصف سنوي">نصف سنوي</option><option value="سنوي">سنوي</option></select>
        <select id="userFilter"><option value="">كل المستخدمين</option></select>
        <select id="countryFilter"><option value="">كل الدول</option></select>
        <select id="sortField"><option value="deviceName">ترتيب حسب اسم الجهاز</option><option value="deviceCode">ترتيب حسب كود الجهاز</option><option value="deviceUser">ترتيب حسب المستخدم</option><option value="originCountry">ترتيب حسب البلد</option><option value="maintenancePlan">ترتيب حسب خطة الصيانة</option></select>
        <select id="sortDirection"><option value="asc">A-Z</option><option value="desc">Z-A</option></select>
        <button id="clearFiltersButton" type="button">مسح الفلاتر</button>
      </div>

      <div class="csv-tools" aria-label="استيراد جماعي من ملف CSV">
        <input id="csvFileInput" type="file" accept=".csv,text/csv" />
        <button id="importCsvButton" type="button">استيراد CSV</button>
      </div>
    </div>
  </div>

  <script src="../../f-it-01-01.js"></script>
  <script src="../../settings.js"></script>
    <script>window.ITSystemSettings.applyPageTitle("F-IT-01-01");</script>
</body>
</html>
