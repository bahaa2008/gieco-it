<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../static/css/styles.css" />
  </head>
  <body class="form-page-body odoo-surface">
    <div class="app-shell">
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <img id="brandLogo" class="brand-logo" alt="شعار الشركة" hidden />
        <div>
          <p class="sidebar-brand-label">لوحة IT</p>
          <h1 id="brandTitle" class="sidebar-brand-title">IT System</h1>
        </div>
      </div>
      <nav class="sidebar-nav" aria-label="التنقل الرئيسي">
        <a class="sidebar-link" href="../../index.html">الرئيسية</a>
        <a class="sidebar-link" href="../users-management">المستخدمون</a>
        <a class="sidebar-link" href="../settings">الإعدادات</a>
      </nav>
    </aside>

    <main class="app-content">
      <header class="content-topbar">
        <div>
          <p id="brandSubtitle" class="topbar-subtitle">لوحة النماذج الداخلية لقسم تقنية المعلومات.</p>
          <p class="topbar-company mb-0">الشركة: <strong id="brandCompanyName">Default Company</strong></p>
        </div>
      </header>

      <section class="form-page container py-4">
      <a class="back-link d-inline-block mb-3" href="../../index.html">← العودة إلى الفهرس</a>
      <h1 class="form-code">إدارة المستخدمين</h1>
      <p class="form-name text-secondary">إدارة قائمة المستخدمين المستخدمة في نموذج F-IT-01-01.</p>

      <section class="inline-tools card border-0 shadow-sm p-3 mb-3">
        <div class="toolbar-row">
          <h2 class="h5 mb-0">المستخدمون</h2>
          <button id="openUserModalButton" class="btn btn-primary" type="button">+ إضافة مستخدم</button>
        </div>
        <input id="userSearchInput" class="form-control mt-3" type="search" placeholder="بحث باسم المستخدم..." />
      </section>

      <div class="table-wrap card border-0 shadow-sm p-2">
        <table class="table table-striped mb-0" aria-label="قائمة المستخدمين">
          <thead>
            <tr><th>#</th><th>اسم المستخدم</th><th>إجراءات</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </section>
    </main>
  </div>

    <div id="userModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="userModalTitle">
      <div class="modal-card" style="max-width: 560px">
        <div class="modal-header"><h3 id="userModalTitle">إضافة / تعديل مستخدم</h3><button id="closeUserModalButton" type="button" class="icon-close" aria-label="إغلاق">×</button></div>
        <form id="userForm" class="inline-form"><input id="userName" name="userName" type="text" placeholder="اسم المستخدم" required /><button id="saveUserButton" type="submit">حفظ</button></form>
      </div>
    </div>

    <script src="../../static/js/admin/users-management.js"></script>
    <script src="../../static/js/core/settings.js"></script>
    <script src="../../static/js/core/app-shell.js"></script>
    <script>window.ITSystemSettings.applyPageTitle("Users Management"); window.ITSystemShell.apply();</script>
</body>
</html>
