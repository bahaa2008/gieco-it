<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F-IT-01-01</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="form-page-body">
  <main class="form-page">
    <a class="back-link" href="index.html">← العودة إلى الفهرس</a>
    <h1 class="form-code">F-IT-01-01</h1>
    <p class="form-name">بيان بأجهزة الــ ( LAP - PC - الأجهزة المساعدة )</p>

    <section class="inline-tools" aria-label="إضافة وتصفية سجلات الأجهزة">
      <h2>إضافة / تعديل سجل</h2>
      <form id="deviceForm" class="inline-form">
        <input id="deviceName" name="deviceName" type="text" placeholder="اسم الجهاز" required />
        <input id="deviceCode" name="deviceCode" type="text" placeholder="كود الجهاز" required />
        <input id="deviceModel" name="deviceModel" type="text" placeholder="موديل الجهاز" required />
        <input id="originCountry" name="originCountry" type="text" placeholder="بلد المنشأ" />
        <input id="serialNumber" name="serialNumber" type="text" placeholder="S.N" />
        <input id="voltAmpere" name="voltAmpere" type="text" placeholder="فولت أمبير" />
        <input id="deviceAmpere" name="deviceAmpere" type="text" placeholder="أمبير الجهاز" />
        <input id="deviceUser" name="deviceUser" type="text" placeholder="اسم مستخدم الجهاز" />
        <select id="maintenancePlan" name="maintenancePlan">
          <option value="">المخطط الزمني للصيانة</option>
          <option value="شهري">شهري</option>
          <option value="ربع سنوي">ربع سنوي</option>
          <option value="نصف سنوي">نصف سنوي</option>
          <option value="سنوي">سنوي</option>
        </select>
        <button id="submitButton" type="submit">إضافة</button>
        <button id="cancelEditButton" type="button" class="secondary-btn" hidden>إلغاء التعديل</button>
      </form>

      <div class="bulk-import-wrap">
        <label for="bulkImportInput">استيراد جماعي (كل سطر = سجل، والفصل بـ |)</label>
        <textarea id="bulkImportInput" rows="4" placeholder="اسم الجهاز|كود الجهاز|موديل الجهاز|بلد المنشأ|S.N|فولت أمبير|أمبير الجهاز|اسم المستخدم|المخطط\nمثال: طابعة ليزر|PRN-100|HP 4103|الصين|SN12|220V|2A|المحاسبة|شهري"></textarea>
        <button id="bulkImportButton" type="button">استيراد البيانات</button>
      </div>

      <div class="filter-bar">
        <input id="searchInput" type="search" placeholder="بحث بالاسم / الكود / المستخدم..." />
        <select id="planFilter">
          <option value="">كل مخططات الصيانة</option>
          <option value="شهري">شهري</option>
          <option value="ربع سنوي">ربع سنوي</option>
          <option value="نصف سنوي">نصف سنوي</option>
          <option value="سنوي">سنوي</option>
        </select>
      </div>
    </section>

    <div class="table-wrap">
      <table aria-label="نموذج بيانات الجهاز">
        <thead>
          <tr>
            <th>اسم الجهاز</th>
            <th>كود الجهاز</th>
            <th>موديل الجهاز</th>
            <th>بلد المنشأ</th>
            <th>S.N</th>
            <th>فولت أمبير</th>
            <th>أمبير الجهاز</th>
            <th>اسم مستخدم الجهاز</th>
            <th>المخطط الزمني للصيانة الدورية</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="devicesTableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="f-it-01-01.js"></script>
</body>
</html>
