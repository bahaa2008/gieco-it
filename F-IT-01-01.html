<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F-IT-01-01</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #ffffff;
      font-family: "Tahoma", "Arial", sans-serif;
    }

    .form-code {
      margin: 0 0 10px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-align: right;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      border: 1px solid #4b4b4b;
      background: #d6d6d6;
      color: #121212;
      font-size: 38px;
      font-weight: 500;
      text-align: center;
      vertical-align: middle;
      padding: 8px 10px;
      line-height: 1.15;
      height: 145px;
      word-wrap: break-word;
    }

    .w-device-name { width: 23%; }
    .w-device-code { width: 13%; }
    .w-device-model { width: 10%; }
    .w-origin-country { width: 9%; }
    .w-serial { width: 15%; }
    .w-volt-amp { width: 8%; }
    .w-device-amp { width: 11%; }
    .w-user-name { width: 15%; }
    .w-maintenance-plan { width: 7%; }
  </style>
</head>
<body>
  <h1 class="form-code">F-IT-01-01</h1>

  <table aria-label="نموذج بيانات الجهاز">
    <thead>
      <tr>
        <th class="w-device-name">اسم الجهاز</th>
        <th class="w-device-code">كود الجهاز</th>
        <th class="w-device-model">موديل الجهاز</th>
        <th class="w-origin-country">بلد المنشأ</th>
        <th class="w-serial">S.N</th>
        <th class="w-volt-amp">فولت أمبير</th>
        <th class="w-device-amp">أمبير الجهاز</th>
        <th class="w-user-name">اسم مستخدم الجهاز</th>
        <th class="w-maintenance-plan">المخطط الزمني للصيانة الدورية</th>
      </tr>
    </thead>
  </table>
</body>
</html>
